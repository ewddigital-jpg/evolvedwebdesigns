<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden | Evolved Web Designs</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <meta name="theme-color" content="#0066FF">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#0066FF;--primary-light:#4D94FF;--accent:#00D9FF;--bg-body:#0D1117;--text:#F0F6FC;--text-secondary:#8B949E}
        body{font-family:'Inter',sans-serif;background:var(--bg-body);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(0,102,255,0.08) 0%,transparent 60%);z-index:-1}
        .container{max-width:600px}
        .error-code{font-family:'Poppins',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem}
        h1{font-family:'Poppins',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:1rem}
        p{color:var(--text-secondary);font-size:1.1rem;line-height:1.7;margin-bottom:2rem}
        .btn{display:inline-block;padding:1rem 2rem;background:linear-gradient(135deg,var(--primary),#0052CC);color:white;text-decoration:none;border-radius:8px;font-weight:600;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(0,102,255,0.3)}
        .btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,102,255,0.5)}
        .links{margin-top:3rem;display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
        .links a{color:var(--text-secondary);text-decoration:none;transition:color 0.3s ease}
        .links a:hover{color:var(--primary)}
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Seite nicht gefunden</h1>
        <p>Die gesuchte Seite existiert leider nicht oder wurde verschoben. Keine Sorge – wir helfen Ihnen gerne weiter!</p>
        <a href="https://evowebdesign.de/" class="btn">Zur Startseite</a>
        <div class="links">
            <a href="https://evowebdesign.de/leistungen.html">Leistungen</a>
            <a href="https://evowebdesign.de/projekte.html"">Projekte</a>
            <a href="https://evowebdesign.de/ueber-uns.html">Über uns</a>
            <a href="https://evowebdesign.de/kontakt.html">Kontakt</a>
        </div>
    </div>
</body>
</html>
